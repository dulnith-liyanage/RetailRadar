[theme]
# Inherit from Streamlit's default dark or light base
base="dark"

# The accent color for active widgets, borders, and sliders
primaryColor="#ff4b4b"

# The main body background color
backgroundColor="#0e1117"

# Background color for the sidebar and input containers
secondaryBackgroundColor="#262730"

# Main text color throughout the application
textColor="#fafafa"

# The default discrete color sequence applied to native charts (st.bar_chart, etc.)
chartCategoricalColors=["#f4dbd6", "#c6a0f6", "#ed8796", "#eed49f", "#a6da95", "#91d7e3", "#8aadf4", "#b7bdf8", "#f5c2e7", "#f0c6c6"]